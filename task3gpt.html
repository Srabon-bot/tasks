<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Delivery Checkout Form</title>
</head>

<body>

<header>
    <h1>Food Delivery Checkout</h1>
    <p>Fill in your details to place an order</p>
</header>

<main>
    <form>

        <!-- Customer Info -->
        <section>
            <h2>Customer Information</h2>

            <div>
                <label for="name">Full Name</label>
                <input id="name" name="name" type="text" required>
            </div>

            <div>
                <label for="phone">Phone Number</label>
                <input id="phone" name="phone" type="tel" required>
            </div>

            <div>
                <label for="email">Email</label>
                <input id="email" name="email" type="email">
            </div>
        </section>

        <!-- Order Type -->
        <section>
            <h2>Order Type</h2>

            <label>
                <input type="radio" name="orderType" value="delivery" required>
                Delivery
            </label>

            <label>
                <input type="radio" name="orderType" value="pickup">
                Pickup
            </label>

            <label>
                <input type="radio" name="orderType" value="dine-in">
                Dine-in
            </label>
        </section>

        <!-- Delivery Preferences -->
        <section>
            <h2>Delivery Preferences</h2>

            <label>
                <input type="checkbox" name="preferences" value="no-onion">
                No Onion
            </label>

            <label>
                <input type="checkbox" name="preferences" value="less-spicy">
                Less Spicy
            </label>

            <label>
                <input type="checkbox" name="preferences" value="extra-sauce">
                Extra Sauce
            </label>

            <label>
                <input type="checkbox" name="preferences" value="halal">
                Halal Preparation
            </label>
        </section>

        <!-- Delivery Time -->
        <section>
            <h2>Delivery Time</h2>

            <label>
                <input type="radio" name="deliveryTime" value="asap">
                ASAP
            </label>

            <label>
                <input type="radio" name="deliveryTime" value="30min">
                30 Minutes
            </label>

            <label>
                <input type="radio" name="deliveryTime" value="1hour">
                1 Hour
            </label>

            <label>
                <input type="radio" name="deliveryTime" value="schedule">
                Schedule Later
            </label>
        </section>

        <!-- Payment -->
        <section>
            <h2>Payment Method</h2>

            <label>
                <input type="radio" name="paymentMethod" value="cod" required>
                Cash on Delivery
            </label>

            <label>
                <input type="radio" name="paymentMethod" value="card">
                Card
            </label>

            <label>
                <input type="radio" name="paymentMethod" value="mobile-banking">
                Mobile Banking
            </label>
        </section>

        <!-- Address -->
        <section>
            <h2>Delivery Address</h2>

            <textarea name="address" placeholder="Enter your full delivery address"></textarea>
        </section>

        <!-- Instructions -->
        <section>
            <h2>Special Instructions</h2>

            <textarea name="instructions" placeholder="Any extra notes for your order..."></textarea>
        </section>

        <!-- Submit -->
        <section>
            <button type="submit">Place Order</button>
        </section>

    </form>
</main>

<footer>
    <small>Thanks for ordering with us 🍽️</small>
</footer>

</body>
</html>
